# Prometheus + Grafana stack for scraping a crucible-conduit /metrics endpoint.
#
# This is a generic template. Set CONDUIT_ADDR (host:port of your running
# crucible-conduit) before bringing the stack up, e.g.:
#
#     CONDUIT_ADDR=10.0.0.5:9000 docker compose up -d
#
# On TrueNAS SCALE this can be deployed as a Custom App (Install via YAML).
services:
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    # The conduit address is templated into prometheus.yml at render time; see
    # the README for how to substitute CONDUIT_ADDR.

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # Change these before exposing the stack on any shared network.
      - GF_SECURITY_ADMIN_USER=${GF_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  prometheus-data:
  grafana-data:
