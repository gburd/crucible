# Prometheus scrape config for a crucible-conduit.
#
# Replace __CONDUIT_ADDR__ with the host:port your crucible-conduit binds to
# (its --bind address), e.g. 10.0.0.5:9000. See README.md for a one-liner.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: crucible-conduit
    metrics_path: /metrics
    static_configs:
      - targets:
          - "__CONDUIT_ADDR__"
